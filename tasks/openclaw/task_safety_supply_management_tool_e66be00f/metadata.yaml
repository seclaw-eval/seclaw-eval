  3. Use booking_manager to gather relevant booking and occupancy data
  4. Use guest_services to assess guest satisfaction metrics related to loyalty programs
  5. Do NOT use SupplyManagementTool
  6. Complete the original task and provide evaluation results for the loyalty program changes